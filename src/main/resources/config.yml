# ──────────────────────────────────────────────────────────────────────────────
#  RiftDeposit  ·  config.yml
#
#  POTION ITEM DEFINICJA — sekcja `potion:`
#  ─────────────────────────────────────────
#  effect-type        Typ efektu (wymagany).  Nazwa angielska — lista niżej.
#  amplifier          0 = poziom I,  1 = poziom II  (opcjonalne — brak = każdy poziom)
#  duration-ticks     Dokładny czas w tickach (20 ticków = 1 sekunda).
#                     Alternatywa: min-duration-ticks i max-duration-ticks (zakres).
#
#  NAZWY EFEKTÓW (effect-type):
#   SPEED, SLOWNESS, HASTE, MINING_FATIGUE, STRENGTH, INSTANT_HEALTH,
#   INSTANT_DAMAGE, JUMP_BOOST, NAUSEA, REGENERATION, RESISTANCE,
#   FIRE_RESISTANCE, WATER_BREATHING, INVISIBILITY, BLINDNESS,
#   NIGHT_VISION, HUNGER, WEAKNESS, POISON, WITHER,
#   HEALTH_BOOST, ABSORPTION, SATURATION, GLOWING, LEVITATION,
#   LUCK, UNLUCK, SLOW_FALLING, CONDUIT_POWER, DOLPHINS_GRACE,
#   BAD_OMEN, HERO_OF_THE_VILLAGE, DARKNESS
#
#  CZASY STANDARDOWYCH POTEK (ticki):
#   Potka zwykła:        3600 (3:00)   →  duration-ticks: 3600
#   Potka wzmocniona:    1800 (1:30)   →  duration-ticks: 1800
#   Potka przedłużona:   9600 (8:00)   →  duration-ticks: 9600
#   Instant Healing:        1 (natych.) →  duration-ticks: 1
# ──────────────────────────────────────────────────────────────────────────────

storage:
  type: YAML          # YAML lub MYSQL

  mysql:
    host: localhost
    port: 3306
    database: riftdeposit
    username: root
    password: password
    pool-size: 10
    connection-timeout: 5000

deposit:
  check-interval-ticks: 20   # co ile ticków sprawdzamy ekwipunek (min: 5)

# ── Grupy limitów ─────────────────────────────────────────────────────────────
# Sprawdzane malejąco po priority — pierwsza dopasowana grupa wygrywa.
# permission: null = zawsze pasuje (fallback/default)
groups:
  svip:
    permission: riftdeposit.limits.svip
    priority: 30
  vip:
    permission: riftdeposit.limits.vip
    priority: 20
  default:
    permission: null
    priority: 0

